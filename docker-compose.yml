services:
  app:
    container_name: gemini-veo-ad-generator
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      # Persist SQLite DB, logs, and generated product assets on the host
      - ./backend/output:/app/backend/output
      # Persist generated scene variants, selections, and stitched commercials
      - ./backend/videos:/app/backend/videos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
